<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vrunn — Logo WhatsApp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 1.5rem;
    font-family: system-ui, sans-serif;
    padding: 2rem;
  }
  .label {
    font-size: 0.68rem;
    color: #475569;
    text-align: center;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .preview-circle {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(249,115,22,0.3);
    box-shadow: 0 0 50px rgba(249,115,22,0.18), 0 0 100px rgba(249,115,22,0.08);
  }
  .btn {
    background: linear-gradient(135deg, #f97316, #fb923c);
    color: #fff;
    border: none;
    padding: 0.8rem 2.2rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(249,115,22,0.45);
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(249,115,22,0.6); }
  .note { color: #334155; font-size: 0.72rem; text-align: center; }
  canvas { display: none; }
</style>
</head>
<body>

<p class="label">Preview — como aparece no WhatsApp</p>

<div class="preview-circle">
  <svg id="logoSvg" xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 500 500">
    <defs>
      <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');</style>
      <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Fundo -->
    <rect width="500" height="500" fill="#0f172a"/>
    <rect width="500" height="500" fill="url(#bgGlow)"/>

    <!--
      Layout: ícone da moto + "Vrunn" lado a lado (igual à navbar),
      centralizados em x=250, y=250.

      Ícone: scale=9, visual de x=-3.8 a x=22 (25.8 unid → 232px),
      y de 4 a 21 (17 unid → 153px).
      Composição total ~480px larg → começa em x=10.
      tx: para speed-line start (-3.8) em x=10 → tx = 10 + 3.8*9 = 44.2 ≈ 44
      Ícone vai de x≈10 até x=44+22*9=242.
      Texto "Vrunn" começa em x=258.

      Vertical: centro em y=250
      ty = 250 - 12.5*9 = 250 - 112.5 = 137.5 ≈ 138
    -->
    <g transform="translate(44,138) scale(9)"
       fill="none" stroke="#f97316" stroke-linecap="round" stroke-linejoin="round">
      <!-- Linhas de velocidade -->
      <line x1="-3"   y1="14.8" x2="1.8" y2="14.8" stroke-width="0.11" stroke-opacity="0.5"/>
      <line x1="-3.8" y1="17.5" x2="1.8" y2="17.5" stroke-width="0.15" stroke-opacity="0.95"/>
      <line x1="-3"   y1="20.2" x2="1.8" y2="20.2" stroke-width="0.11" stroke-opacity="0.5"/>
      <!-- Moto -->
      <circle cx="5.5"  cy="17.5" r="3.5" stroke-width="0.22"/>
      <circle cx="18.5" cy="17.5" r="3.5" stroke-width="0.22"/>
      <circle cx="15"   cy="5"    r="1"   stroke-width="0.22"/>
      <path d="M12 17.5V14l-3-3 4-3 2 3h2" stroke-width="0.22"/>
    </g>

    <!-- "Vrunn" — alinhado à direita do ícone, verticalmente centrado -->
    <text x="258" y="275"
      font-family="'Inter','Arial Black','Helvetica Neue',Arial,sans-serif"
      font-weight="900"
      font-size="108"
      fill="#f97316"
      letter-spacing="-4">Vrunn</text>

  </svg>
</div>

<button class="btn" onclick="downloadPng()">Baixar PNG (1000 × 1000)</button>
<p class="note">Alta resolução — ideal para foto de perfil</p>

<canvas id="c" width="1000" height="1000"></canvas>

<script>
function downloadPng() {
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const svg    = document.getElementById('logoSvg');

  const clone = svg.cloneNode(true);
  clone.setAttribute('width',  '1000');
  clone.setAttribute('height', '1000');

  const svgData = new XMLSerializer().serializeToString(clone);
  const blob    = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url     = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = function () {
    ctx.clearRect(0, 0, 1000, 1000);
    ctx.drawImage(img, 0, 0, 1000, 1000);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'vrunn-logo.png';
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  img.src = url;
}
</script>

</body>
</html>
